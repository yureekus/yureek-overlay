name: Update Equibop

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.OVERLAY_PUSH_TOKEN || github.token }}

      - name: Update ebuild and manifest
        run: |
          chmod +x .github/scripts/bump-equibop.sh
          .github/scripts/bump-equibop.sh

      - name: Commit and push directly to main
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add net-im/equibop
          git commit -m "net-im/equibop: bump to latest upstream release"
          git pull --rebase origin main
          git push origin HEAD:main
